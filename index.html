<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BIC - System Biletowy</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #eee; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
    .field { margin-bottom: 10px; font-size: 14px; }
    canvas { width: 100%; height: auto; margin-top: 20px; border: 1px solid #ccc; padding: 5px; }
  </style>
</head>
<body>

<div class="card">
  <h2>BIC - Twoje Dane</h2>
  <input type="file" id="fileInput" accept="image/*" onchange="process(this)">
  
  <div id="data" style="margin-top:20px;">
    <div class="field"><b>Stacja początkowa:</b> <span id="start">...</span></div>
    <div class="field"><b>Stacja końcowa:</b> <span id="end">...</span></div>
    <div class="field"><b>Godziny:</b> <span id="time">...</span></div>
    <div class="field"><b>Wagon/Miejsce:</b> <span id="seat">...</span></div>
    <div class="field"><b>Taryfa:</b> <span id="tariff">...</span></div>
    <canvas id="barcodeCanvas"></canvas>
  </div>
</div>

<script>
  async function process(input) {
    const file = input.files[0];
    const { data: { text } } = await Tesseract.recognize(file, 'pol');

    // Wyciąganie danych (Uproszczone dopasowanie do wzorca z Twojego zdjęcia)
    const routes = text.match(/(.*) => (.*)/);
    if(routes) { document.getElementById('start').innerText = routes[1].trim(); document.getElementById('end').innerText = routes[2].trim(); }
    
    const times = text.match(/(\d{2}:\d{2}).*=>.*(\d{2}:\d{2})/);
    if(times) document.getElementById('time').innerText = `Odjazd: ${times[1]} Przyjazd: ${times[2]}`;
    
    // Generowanie kodu dla konduktora
    const idMatch = text.match(/ZZ\d+/);
    if(idMatch) {
      bwipjs.toCanvas('barcodeCanvas', { bcid: 'code128', text: idMatch[0], scale: 3 });
    }
  }
</script>
</body>
</html>
