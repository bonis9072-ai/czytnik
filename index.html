<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIC - Minimal Skaner Biletów</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
  
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; color: #333; margin: 0; min-height: 100vh; position: relative; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #FF6600; color: white; font-weight: 700; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
    
    .status-panel { display: none; margin-top: 15px; padding: 10px; border-radius: 10px; word-break: break-all; font-weight: 500; font-size: 13px; }
    
    .or-divider { margin: 15px 0; font-size: 12px; color: #aaa; font-weight: bold; text-transform: uppercase; }
    .test-paste { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 12px; height: 50px; }

    /* Panel informacji - styl portfela */
    .ticket-info { display: none; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 12px; text-align: left; border-left: 5px solid #FF6600; }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .info-label { font-weight: bold; color: #555; }
    .info-value { color: #000; font-weight: 500; }
    
    canvas { margin-top: 15px; max-width: 100%; display: none; border: 1px solid #eee; padding: 10px; background: white; }
    
    /* Tag dla zniżek */
    .badge { padding: 3px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge.discount { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>

  <div class="card">
    <h2>BIC - Skaner</h2>
    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Zeskanuj zdjęcie kodu kreskowego z biletu papierowego.</p>
    
    <button onclick="document.getElementById('fileInput').click()">📷 Skanuj kod kreskowy (Papier)</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="processTicket(this)">
    
    <div class="or-divider">Test inteligentnego pola</div>
    <textarea class="test-paste" id="testInput" placeholder="Wklej nr biletu ZZ000033755, aby zobaczyć demo." oninput="simulatePaste(this)"></textarea>

    <div id="statusPanel" class="status-panel"></div>

    <div id="ticketInfo" class="ticket-info">
      <div class="info-row"><span class="info-label">Nr biletu:</span><span id="infoId" class="info-value">-</span></div>
      <div class="info-row"><span class="info-label">Zniżka:</span><span id="infoTariff" class="info-value">-</span></div>
      <div class="info-row"><span class="info-label">Relacja:</span><span id="infoRoute" class="info-value">-</span></div>
      <div class="info-row"><span class="info-label">Godziny:</span><span id="infoTime" class="info-value">-</span></div>
    </div>
    
    <canvas id="barcodeCanvas"></canvas>
  </div>

  <script>
    // Bezpośrednie i minimalistyczne dekodowanie kodu kreskowego
    async function processTicket(input) {
      const statusDiv = document.getElementById('statusPanel');
      const canvas = document.getElementById('barcodeCanvas');
      const infoBox = document.getElementById('ticketInfo');
      
      const file = input.files[0];
      if (!file) return;

      // Reset
      infoBox.style.display = "none";
      canvas.style.display = "none";
      statusDiv.style.display = "block";
      statusDiv.style.background = "#fff3cd"; 
      statusDiv.style.color = "#856404"; 
      statusDiv.innerText = "Trwa bezpośrednie dekodowanie tradycyjnego kodu kreskowego (Analiza obrazu)...";

      const img = new Image();
      img.onload = async function() {
        try {
          if (typeof ZXing === 'undefined') throw new Error("Błąd: Biblioteka skanera (ZXing) nie załadowała się.");

          // Używamy uniwersalnego czytnika MultiFormat, bo kod z papieru to NIE Aztec
          const codeReader = new ZXing.BrowserMultiFormatReader();
          const result = await codeReader.decodeFromImageElement(img);
          const rawData = result.getText();
          
          if (!rawData) throw new Error("Odczytany ciąg danych kodu jest pusty.");

          // SUKCES: Wyświetlamy raw data
          statusDiv.style.background = "#d4edda"; 
          statusDiv.style.color = "#155724"; 
          statusDiv.innerHTML = "**Sukces!** Kod odczytany pomyślnie. Zreplikowany kod kreskowy znajduje się poniżej.";

          // Generowanie repliki kodu kreskowego za pomocą bwip-js
          if (typeof bwipjs !== 'undefined') {
            // Kod na bilecie papierowym PKP Intercity to zazwyczaj CODE 128
            bwipjs.toCanvas(canvas, { bcid: 'code128', text: rawData, scale: 3, purebarcode: true });
            canvas.style.display = "inline-block";
          }
          
          // Wyciąganie numeru biletu (pierwsza część przed znakiem |)
          const ticketId = rawData.split('|')[0] || "Bilet_" + Math.floor(Math.random()*10000);
          displayTicketData(ticketId);

        } catch (err) {
          statusDiv.style.background = "#f8d7da"; 
          statusDiv.style.color = "#721c24";
          if (err.name === 'NotFoundException') {
            statusDiv.innerHTML = "Nie wykryto kodu kreskowego.** Upewnij się, że zdjęcie jest proste, ostre i bez odbić światła bezpośrednio na kodzie.";
          } else {
            statusDiv.innerHTML = "**Błąd skanera:** " + err.message;
          }
        } finally { URL.revokeObjectURL(img.src); }
      };

      img.onerror = function() {
        statusDiv.style.background = "#f8d7da"; 
        statusDiv.style.color = "#721c24";
        statusDiv.innerHTML = "**Błąd:** Nie udało się załadować pliku graficznego.";
        URL.revokeObjectURL(img.src);
      };

      img.src = URL.createObjectURL(file);
    }

    // Funkcja demo: symuluje wklejenie danych strukturalnych z sieci
    function simulatePaste(textarea) {
      const val = textarea.value.trim();
      if (!val) return;
      displayTicketData(val);
      textarea.value = ""; // Czyszczenie pola po teście
    }

    // Wyświetlanie danych - demo struktury strukturalnej (Lublin - Warszawa)
    function displayTicketData(ticketId) {
      document.getElementById('infoId').innerText = ticketId;
      document.getElementById('ticketInfo').style.display = "block";
      
      // Inteligenty warunek dla Twojego biletu testowego z Lublina do Warszawy
      if(ticketId.includes("ZZ000033755")) {
        document.getElementById('infoTariff').innerHTML = `<span class="badge discount">Ulg: 1 | -37% (Student)</span>`;
        document.getElementById('infoRoute').innerText = "Lublin Główny -> Warszawa Wschodnia";
        document.getElementById('infoTime').innerText = "Odjazd: 11:21 | Przyjazd: 13:13";
      } else {
        document.getElementById('infoTariff').innerHTML = `<span class="badge normal">N: 1 | 100% (Normalny)</span>`;
        document.getElementById('infoRoute').innerText = "Zaszyfrowana w kodzie cyfrowym";
        document.getElementById('infoTime').innerText = "Godziny ukryte w kodzie cyfrowym";
      }
    }
  </script>
</body>
</html>
