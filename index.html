<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BIC - Czytnik Biletów</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff; padding: 10px; }
        .card { max-width: 400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        td, th { border: 1px solid #000; padding: 5px; font-size: 12px; }
        /* Kod kreskowy na czystym białym tle z odpowiednim marginesem */
        #barcodeCanvas { 
            width: 100%; 
            height: 100px; 
            padding: 20px; /* Strefa ciszy */
            box-sizing: border-box;
            background: white; 
        }
    </style>
</head>
<body>
<div class="card">
    <input type="file" id="fileInput" accept="image/*" onchange="process(this)">
    <table id="dataTable">
        <tr><th>Data / Godzina</th><th>Stacja</th></tr>
        <tr><td><span id="dateDep"></span> <span id="timeDep"></span></td><td><span id="startStation"></span></td></tr>
        <tr><td><span id="dateArr"></span> <span id="timeArr"></span></td><td><span id="endStation"></span></td></tr>
        <tr><td colspan="2">Wagon/Miejsce: <span id="seat"></span></td></tr>
    </table>
    <canvas id="barcodeCanvas"></canvas>
</div>

<script>
    async function process(input) {
        const file = input.files[0];
        const { data: { text } } = await Tesseract.recognize(file, 'pol');

        // Automatyczne wypełnianie tabeli (logika uproszczona dla czytelności)
        // ... (analogiczna logika do poprzedniej wersji)

        const idMatch = text.match(/ZZ\d+/);
        if(idMatch) {
            bwipjs.toCanvas('barcodeCanvas', {
                bcid: 'code128',
                text: idMatch[0],
                scale: 3,
                height: 20,
                includetext: false,
                padding: 10 // Wymuszenie strefy ciszy dla skanera
            });
        }
    }
</script>
</body>
</html>
