<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BIC - Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: white; padding: 20px; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { border: 1px solid #000; padding: 10px; }
        #barcode { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="input-group">
        <input type="text" id="zz" placeholder="Wpisz numer ZZ (np. ZZ000033755)" oninput="draw()">
    </div>
    
    <table id="biletyInfo">
        <tr><td>Data/Godz Odjazdu:</td><td><input type="text" id="dep" placeholder="15.12 11:21"></td></tr>
        <tr><td>Stacja:</td><td><input type="text" id="stacja" placeholder="Warszawa Wsch. -> Lublin"></td></tr>
        <tr><td>Wagon/Miejsce:</td><td><input type="text" id="miejsce" placeholder="12 / 71"></td></tr>
    </table>

    <canvas id="barcode"></canvas>

    <script>
        function draw() {
            const zz = document.getElementById('zz').value;
            const canvas = document.getElementById('barcode');
            if(zz.length > 5) {
                bwipjs.toCanvas(canvas, {
                    bcid: 'code128',
                    text: zz,
                    scale: 4,
                    height: 20,
                    includetext: false
                });
            }
        }
    </script>
</body>
</html>
