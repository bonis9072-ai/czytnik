<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BIC - System Biletu</title>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { border: 1px solid #ccc; padding: 8px; font-size: 13px; }
        input { width: 90%; border: none; background: #f9f9f9; }
        canvas { width: 100%; height: 60px; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h3>Edytor Biletu BIC</h3>
    <input type="text" id="zzNumber" placeholder="Wpisz nr ZZ (np. ZZ000033755)" oninput="generate()">
    
    <table>
        <tr><th>Data / Godzina</th><th>Stacja</th></tr>
        <tr><td><input type="text" id="depTime" value="11:21" oninput="generate()"></td><td><input type="text" id="startStation" value="Warszawa Wsch." oninput="generate()"></td></tr>
        <tr><td><input type="text" id="arrTime" value="13:13" oninput="generate()"></td><td><input type="text" id="endStation" value="Lublin Główny" oninput="generate()"></td></tr>
    </table>
    
    <p>Wagon/Miejsce: <input type="text" id="seat" value="12 / 71" oninput="generate()"></p>
    <canvas id="barcodeCanvas"></canvas>
</div>

<script>
    function generate() {
        const zz = document.getElementById('zzNumber').value;
        const canvas = document.getElementById('barcodeCanvas');
        
        if (zz.length >= 5) { // Generuje kod tylko gdy wpiszesz numer
            bwipjs.toCanvas(canvas, {
                bcid: 'code128',
                text: zz,
                scale: 3,
                height: 12,
                includetext: false // Brak cyferek pod spodem
            });
        }
    }
</script>
</body>
</html>
