<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BIC - Generator 1:1</title>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; }
        #barcodeCanvas { margin-top: 20px; width: 100%; background: #fff; }
    </style>
</head>
<body>
<div class="card">
    <h2>Generator Kodu 1:1</h2>
    <input type="text" id="codeText" placeholder="Wpisz nr ZZ000033755">
    <button onclick="renderBarcode()">Generuj kod 1:1</button>
    <canvas id="barcodeCanvas"></canvas>
</div>

<script>
    function renderBarcode() {
        const text = document.getElementById('codeText').value;
        const canvas = document.getElementById('barcodeCanvas');
        
        // bwip-js generuje kod 1:1 zgodnie ze specyfikacją Code 128
        bwipjs.toCanvas(canvas, {
            bcid: 'code128', // Standard PKP
            text: text,
            scale: 4,        // Skala zapewniająca czytelność 1:1 dla czytników
            height: 15,
            includetext: true
        });
    }
</script>
</body>
</html>
