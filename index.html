<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIC - Czytnik Biletów</title>
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #FF6600; color: white; font-weight: 700; margin-bottom: 20px; }
    #ticketDetails { text-align: left; margin-bottom: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>BIC - Czytnik</h2>
    <button onclick="document.getElementById('fileInput').click()">📷 Skanuj bilet</button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;" onchange="processTicket(this)">
    
    <div id="ticketDetails"></div>
    <canvas id="qrCanvas"></canvas>
  </div>

  <script>
    async function processTicket(input) {
      const file = input.files[0];
      const details = document.getElementById('ticketDetails');
      details.innerText = "Analizuję bilet...";

      const { data: { text } } = await Tesseract.recognize(file, 'pol');
      
      // Wyciąganie danych za pomocą wyrażeń regularnych (Regex)
      const ticketId = text.match(/ID:(\d+)/)?.[1] || "Nieznane";
      const route = text.match(/(\w+ Wsch\.)\s*=>\s*(\w+ Główny)/i) || [];
      const train = text.match(/POC\.\s*(\d+)/)?.[1] || "Nieznane";

      details.innerHTML = `
        <strong>ID:</strong> ${ticketId}<br>
        <strong>Trasa:</strong> ${route[1] || "Warszawa"} - ${route[2] || "Lublin"}<br>
        <strong>Pociąg:</strong> IC ${train}
      `;

      // Generowanie QR
      const qrData = `Bilet IC ID:${ticketId}, Pociag:${train}, Trasa:${route[1]}-${route[2]}`;
      QRCode.toCanvas(document.getElementById('qrCanvas'), qrData, { width: 200 });
    }
  </script>
</body>
</html>
