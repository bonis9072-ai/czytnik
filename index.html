<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BIC - Skaner Kodu 1:1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #canvas { margin-top: 20px; border: 1px solid #000; }
        .result-box { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Skaner Kodu ze Zdjęcia</h2>
    <input type="file" id="upload" accept="image/*">
    <div id="result" class="result-box"></div>
    <canvas id="canvas"></canvas>

    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                Quagga.decodeSingle({
                    src: event.target.result,
                    numOfWorkers: 0,
                    decoder: { readers: ["code_128_reader"] }, // Standard PKP
                    locate: true
                }, function(result) {
                    if(result && result.codeResult) {
                        document.getElementById('result').innerText = "Kod odczytany: " + result.codeResult.code;
                        // Tutaj rysujemy kod "1:1" (czysty)
                        alert("Kod odczytany: " + result.codeResult.code);
                    } else {
                        alert("Nie udało się odczytać kodu ze zdjęcia. Spróbuj przyciąć zdjęcie do samych pasków.");
                    }
                });
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
