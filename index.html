<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BIC - Czytnik Biletów</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    h2 { color: #002D72; margin-bottom: 10px; }
    p { color: #666; font-size: 14px; margin-bottom: 25px; }
    button { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; background: #FF6600; color: white; font-weight: 700; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; padding: 15px; border-radius: 10px; background: #f8f8f8; font-size: 14px; color: #333; min-height: 50px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>BIC</h2>
    <p>Czytnik biletów Intercity</p>
    
    <button onclick="document.getElementById('fileInput').click()">📷 Skanuj bilet</button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;" onchange="handleFile(this)">

    <div id="result">Gotowy do skanowania...</div>
  </div>

  <script>
    function handleFile(input) {
      const file = input.files[0];
      if (file) {
        document.getElementById('result').innerText = "Wczytano: " + file.name + "\nTrwa analiza zdjęcia...";
        
        // Tutaj w przyszłości podłączysz skrypt, który przetworzy zdjęcie
        // Na razie symulujemy działanie
        setTimeout(() => {
          document.getElementById('result').innerText = "Analiza: Zdjęcie zostało przesłane do przetworzenia.";
        }, 1500);
      }
    }
  </script>
</body>
</html>
