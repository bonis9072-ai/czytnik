<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BIC - Inteligentny Czytnik Biletów</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #e0e0e0; padding: 20px; text-align: center; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { width: 100%; padding: 15px; background: #FF6600; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    #dataPanel { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 12px; text-align: left; display: none; }
    .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
    .label { font-weight: bold; color: #555; }
  </style>
</head>
<body>

  <div class="card">
    <h2>BIC - Inteligentny Czytnik</h2>
    <button onclick="document.getElementById('fileInput').click()">📷 Wgraj zdjęcie biletu</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="analyzeTicket(this)">
    
    <div id="dataPanel">
      <div class="row"><span class="label">Taryfa:</span><span id="txtTariff">-</span></div>
      <div class="row"><span class="label">Relacja:</span><span id="txtRoute">-</span></div>
      <div class="row"><span class="label">Godziny:</span><span id="txtTime">-</span></div>
      <div class="row"><span class="label">Miejsce:</span><span id="txtSeat">-</span></div>
    </div>
  </div>

  <script>
    async function analyzeTicket(input) {
      const file = input.files[0];
      const panel = document.getElementById('dataPanel');
      if (!file) return;

      panel.style.display = "block";
      document.getElementById('txtTariff').innerText = "Czytanie tekstu...";

      // Uruchamiamy OCR (Tesseract), który "czyta" tekst ze zdjęcia
      const { data: { text } } = await Tesseract.recognize(file, 'pol');

      // Prosta logika wyciągania danych z tekstu (tzw. regex)
      const tariff = text.includes("ULG") ? "Ulgowy" : "Normalny";
      const matchRoute = text.match(/(.*) => (.*)/);
      const matchTime = text.match(/(\d{2}:\d{2}) -> (\d{2}:\d{2})/);
      const matchSeat = text.match(/WAGON \d+ M\. DO SIEDZENIA (\d+)/);

      document.getElementById('txtTariff').innerText = tariff;
      document.getElementById('txtRoute').innerText = matchRoute ? `${matchRoute[1]} -> ${matchRoute[2]}` : "Nie wykryto";
      document.getElementById('txtTime').innerText = matchTime ? `${matchTime[1]} - ${matchTime[2]}` : "-";
      document.getElementById('txtSeat').innerText = matchSeat ? `Wagon X, miejsce ${matchSeat[1]}` : "-";
    }
  </script>
</body>
</html>
