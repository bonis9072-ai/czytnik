<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIC - Skaner & Pamięć</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; background: #e0e0e0; padding: 20px; text-align: center; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #FF6600; color: white; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
    #resultPanel { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <h2>BIC - Skaner & Pamięć</h2>
    <p>Wybierz zdjęcie biletu. Skaner odczyta kod.</p>
    
    <button onclick="document.getElementById('fileInput').click()">📷 Skanuj bilet (Papier / PDF)</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(this)">
    
    <div id="resultPanel"></div>
  </div>

  <script>
    const html5QrCode = new Html5Qrcode("resultPanel");

    function handleFile(input) {
      const file = input.files[0];
      const res = document.getElementById('resultPanel');
      if (!file) return;

      res.style.display = "block";
      res.style.background = "#fff3cd";
      res.innerText = "Skanowanie w toku...";

      // Używamy dedykowanego skanera plików
      html5QrCode.scanFile(file, true)
        .then(decodedText => {
          res.style.background = "#d4edda";
          res.innerText = "ODCZYTANO KOD: " + decodedText;
        })
        .catch(err => {
          res.style.background = "#f8d7da";
          res.innerText = "Nie udało się odczytać. Upewnij się, że zdjęcie jest ostre.";
        });
    }
  </script>
</body>
</html>
